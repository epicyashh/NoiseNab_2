services:
  # Express Backend API
  - type: web
    name: noisenab-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production

  # Django Noisemap Service
  - type: web
    name: noisenab-noisemap
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd noisemap && pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: cd noisemap && gunicorn SatIndustry.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"

  # React Frontend (Static Site)
  - type: web
    name: noisenab-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
      - key: REACT_APP_DJANGO_URL
        sync: false
